<!DOCTYPE html>

<title>Codeforces 用户列表</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter','Segoe UI','Microsoft YaHei',sans-serif;}
body{background:#f5f7fc;color:#212529;line-height:1.6;}
.container{max-width:1400px;margin:0 auto;padding:40px 20px;}
.card{background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.06);overflow:hidden;}
.card-header{background:linear-gradient(90deg,#3a86ff,#8338ec);color:#fff;padding:24px 32px;}
.card-header h1{font-size:1.8rem;margin:0;}
table{width:100%;border-collapse:collapse;}
th{background:#f8f9fb;font-weight:600;padding:16px 12px;text-align:center;border-bottom:2px solid #e0e0e0;}
td{padding:14px 12px;text-align:center;border-bottom:1px solid #eee;transition:.2s;}
tr:hover{background:#f6f8ff;}
.user-link{text-decoration:none;color:#3a86ff;font-weight:700;font-size:1.1rem;transition:.2s;}
.user-link:hover{color:#8338ec;}
.legendary{color:#ff006e;font-weight:700;}
.master{color:#ff8c00;font-weight:700;}
.candidate{color:#aa00aa;font-weight:700;}
.expert{color:#2266cc;font-weight:700;}
.specialist{color:#03a89e;font-weight:700;}
.newbie{color:#808080;font-weight:700;}
.avatar{width:48px;height:48px;border-radius:50%;vertical-align:middle;margin-right:8px;border:2px solid #eee;}
.stat-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;}
.stat-badge.rating{background:#e8f4fd;color:#1e88e5;}
.stat-badge.contest{background:#fff3e0;color:#ff9800;}
.stat-badge.max{background:#f3e5f5;color:#7b1fa2;}
</style>
</head>
